@let data = track();

<div class="music-card">
    <div class="artwork">
        @if (data.artwork_url) {
            <img [src]="data.artwork_url" [alt]="data.filename">
        } @else {
            <div class="placeholder">
                <svg fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
                     stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M9 18V5l12-2v13"/>
                    <circle cx="6" cy="18" r="3"/>
                    <circle cx="18" cy="16" r="3"/>
                </svg>
            </div>
        }
    </div>

    <div class="content">
        <div class="info">
            <h3 class="title text-truncate">{{ displayTitle() }}</h3>
            <span class="album text-truncate">{{ data.album }}</span>
        </div>

        <div class="meta">
          <span [attr.data-format]="data.format" class="badge">
            {{ data.format }}
          </span>
        </div>

        <div class="actions">
            <button mat-icon-button (click)="onDeleteMusic.emit()"><svg lucideTrash/></button>
        </div>
    </div>
</div>
