@let data = track();

<div class="music-card" (click)="onTrackClick.emit()">
    <div class="artwork">
        @if (data.artwork_url) {
            <img [ngSrc]="data.artwork_url" [alt]="data.filename" width="42" height="42">
        } @else {
            <div class="placeholder">
                <mat-icon>music_note</mat-icon>
            </div>
        }
    </div>

    <div class="content">
        <div class="info">
            <h3 class="title text-truncate">{{ displayTitle() }}</h3>
            <span class="album text-truncate">{{ data.album }}</span>
        </div>

        <div class="meta">
          <span [attr.data-format]="data.format" class="badge">
            {{ data.format }}
          </span>
        </div>

        <div class="actions" (click)="$event.stopPropagation()">
            <button mat-icon-button (click)="onDeleteMusic.emit()">
                <mat-icon>delete</mat-icon>
            </button>
        </div>
    </div>
</div>
